pipeline:
  name: Pipeline
  identifier: Pipeline
  projectIdentifier: appteamone
  orgIdentifier: gitopsdemo
  tags: {}
  stages:
    - stage:
        name: Dev
        identifier: Dev
        description: ""
        type: Deployment
        variables:
          - name: defaultImageTag
            type: String
            value: <+input>
        spec:
          deploymentType: Kubernetes
          gitOpsEnabled: true
          service:
            serviceRef: appone
          environment:
            environmentRef: dev
            deployToAll: true
          execution:
            steps:
              - step:
                  type: GitOpsUpdateReleaseRepo
                  name: Update Release Repo
                  identifier: updateReleaseRepo
                  timeout: 10m
                  spec:
                    variables:
                      - name: image.tag
                        type: String
                        value: <+pipeline.stages.Dev.variables.defaultImageTag>
                    allowEmptyCommit: true
              - step:
                  type: MergePR
                  name: Merge PR
                  identifier: mergePR
                  timeout: 10m
                  spec:
                    deleteSourceBranch: true
                    mergeStrategy: merge
              - step:
                  type: GitOpsFetchLinkedApps
                  name: Fetch Linked Apps
                  identifier: fetchLinkedApps
                  timeout: 10m
                  spec:
                    filterByServiceEnvCluster: true
              - step:
                  type: GitOpsSync
                  name: GitOpsSync
                  identifier: GitOpsSync
                  timeout: 10m
                  spec:
                    waitTillHealthy: true
                    prune: false
                    dryRun: false
                    applyOnly: false
                    forceApply: false
                    retryStrategy: {}
                    retry: false
                    syncOptions:
                      skipSchemaValidation: false
                      autoCreateNamespace: false
                      pruneResourcesAtLast: false
                      applyOutOfSyncOnly: false
                      replaceResources: false
                      prunePropagationPolicy: foreground
                      respectIgnoreDifferences: false
                      serverSideApply: false
                    autoPromoteRolloutBehavior: promote-full
                    degradedStateTimeout: ""
                    failOnTimeout: true
                    applicationsList:
                      - applicationName: podinfo-dev
                        agentId: org.gitopsappteamone
            rollbackSteps:
              - step:
                  type: RevertPR
                  name: RevertPR
                  identifier: RevertPR
                  timeout: 10m
                  spec:
                    commitId: <+pipeline.stages.Dev.spec.execution.steps.updateReleaseRepo.updateReleaseRepoOutcome.commitId>
              - step:
                  type: MergePR
                  name: Merge Revert PR
                  identifier: mergeRevertPR
                  timeout: 10m
                  spec:
                    deleteSourceBranch: true
                    mergeStrategy: merge
              - step:
                  type: GitOpsSync
                  name: Sync Rollback
                  identifier: syncRollback
                  timeout: 3m
                  spec:
                    waitTillHealthy: true
                    prune: false
                    dryRun: false
                    applyOnly: false
                    forceApply: false
                    applicationsList: []
                    retryStrategy: {}
                    retry: false
                    syncOptions:
                      skipSchemaValidation: false
                      autoCreateNamespace: false
                      pruneResourcesAtLast: false
                      applyOutOfSyncOnly: false
                      replaceResources: false
                      prunePropagationPolicy: foreground
                      respectIgnoreDifferences: false
                      serverSideApply: false
        tags: {}
        failureStrategies:
          - onFailure:
              errors:
                - AllErrors
              action:
                type: StageRollback
    - stage:
        name: Staging
        identifier: Staging
        description: ""
        type: Deployment
        spec:
          deploymentType: Kubernetes
          gitOpsEnabled: true
          service:
            useFromStage:
              stage: Dev
          environment:
            environmentRef: staging
            deployToAll: true
          execution:
            steps:
              - step:
                  type: GitOpsUpdateReleaseRepo
                  name: Update Release Repo
                  identifier: updateReleaseRepo
                  timeout: 10m
                  spec:
                    variables:
                      - name: image.tag
                        type: String
                        value: <+pipeline.stages.Dev.variables.defaultImageTag>
                    allowEmptyCommit: true
              - step:
                  type: MergePR
                  name: Merge PR
                  identifier: mergePR
                  timeout: 10m
                  spec:
                    deleteSourceBranch: true
                    mergeStrategy: merge
              - step:
                  type: GitOpsFetchLinkedApps
                  name: Fetch Linked Apps
                  identifier: fetchLinkedApps
                  timeout: 10m
                  spec:
                    filterByServiceEnvCluster: true
              - step:
                  type: GitOpsSync
                  name: GitOpsSync
                  identifier: GitOpsSync
                  timeout: 10m
                  spec:
                    waitTillHealthy: true
                    prune: false
                    dryRun: false
                    applyOnly: false
                    forceApply: false
                    retryStrategy: {}
                    retry: false
                    syncOptions:
                      skipSchemaValidation: false
                      autoCreateNamespace: false
                      pruneResourcesAtLast: false
                      applyOutOfSyncOnly: false
                      replaceResources: false
                      prunePropagationPolicy: foreground
                      respectIgnoreDifferences: false
                      serverSideApply: false
                    autoPromoteRolloutBehavior: promote-full
                    degradedStateTimeout: ""
                    failOnTimeout: true
                    applicationsList:
                      - applicationName: podinfo-staging
                        agentId: org.gitopsappteamone
            rollbackSteps:
              - step:
                  type: RevertPR
                  name: RevertPR
                  identifier: RevertPR
                  timeout: 10m
                  spec:
                    commitId: <+pipeline.stages.Staging.spec.execution.steps.updateReleaseRepo.updateReleaseRepoOutcome.commitId>
              - step:
                  type: MergePR
                  name: Merge Revert PR
                  identifier: mergeRevertPR
                  timeout: 10m
                  spec:
                    deleteSourceBranch: true
                    mergeStrategy: merge
              - step:
                  type: GitOpsSync
                  name: Sync Rollback
                  identifier: syncRollback
                  timeout: 3m
                  spec:
                    waitTillHealthy: true
                    prune: false
                    dryRun: false
                    applyOnly: false
                    forceApply: false
                    applicationsList: []
                    retryStrategy: {}
                    retry: false
                    syncOptions:
                      skipSchemaValidation: false
                      autoCreateNamespace: false
                      pruneResourcesAtLast: false
                      applyOutOfSyncOnly: false
                      replaceResources: false
                      prunePropagationPolicy: foreground
                      respectIgnoreDifferences: false
                      serverSideApply: false
        tags: {}
        failureStrategies:
          - onFailure:
              errors:
                - AllErrors
              action:
                type: StageRollback
    - stage:
        name: Approval
        identifier: Approval
        description: ""
        type: Approval
        spec:
          execution:
            steps:
              - step:
                  name: Approve to Prod
                  identifier: Approve_to_Prod
                  type: HarnessApproval
                  timeout: 1d
                  spec:
                    approvalMessage: |-
                      Please review the following information
                      and approve the pipeline progression
                    includePipelineExecutionHistory: true
                    approvers:
                      minimumCount: 1
                      disallowPipelineExecutor: false
                      userGroups:
                        - account._account_all_users
                    isAutoRejectEnabled: false
                    approverInputs: []
        tags: {}
    - stage:
        name: Prod
        identifier: Prod
        description: ""
        type: Deployment
        spec:
          deploymentType: Kubernetes
          gitOpsEnabled: true
          execution:
            steps:
              - step:
                  type: GitOpsUpdateReleaseRepo
                  name: Update Release Repo
                  identifier: updateReleaseRepo
                  timeout: 10m
                  spec:
                    variables:
                      - name: image.tag
                        type: String
                        value: <+pipeline.stages.Dev.variables.defaultImageTag>
                    allowEmptyCommit: true
              - step:
                  type: MergePR
                  name: Merge PR
                  identifier: mergePR
                  spec:
                    deleteSourceBranch: true
                  timeout: 10m
              - step:
                  type: GitOpsFetchLinkedApps
                  name: Fetch Linked Apps
                  identifier: fetchLinkedApps
                  timeout: 10m
                  spec:
                    filterByServiceEnvCluster: true
              - step:
                  type: GitOpsSync
                  name: ArgoCD Sync
                  identifier: GitOps_Sync
                  spec:
                    prune: false
                    dryRun: false
                    applyOnly: false
                    forceApply: false
                    applicationsList:
                      - applicationName: podinfo-prod
                        agentId: org.gitopsappteamone
                    retryStrategy: {}
                    retry: false
                    syncOptions:
                      skipSchemaValidation: false
                      autoCreateNamespace: false
                      pruneResourcesAtLast: false
                      applyOutOfSyncOnly: false
                      replaceResources: false
                      prunePropagationPolicy: foreground
                      respectIgnoreDifferences: false
                      serverSideApply: false
                  timeout: 10m
              - parallel:
                  - step:
                      type: Wait
                      name: Soak 20
                      identifier: Soak_20
                      spec:
                        duration: 10m
                  - step:
                      type: Verify
                      name: Verify_1
                      identifier: Verify_1
                      spec:
                        isMultiServicesOrEnvs: false
                        type: Canary
                        monitoredService:
                          type: Default
                          spec: {}
                        spec:
                          sensitivity: HIGH
                          duration: 5m
                      timeout: 2h
                      failureStrategies:
                        - onFailure:
                            errors:
                              - Verification
                            action:
                              type: ManualIntervention
                              spec:
                                timeout: 2h
                                onTimeout:
                                  action:
                                    type: StageRollback
                        - onFailure:
                            errors:
                              - Unknown
                            action:
                              type: ManualIntervention
                              spec:
                                timeout: 2h
                                onTimeout:
                                  action:
                                    type: Ignore
              - step:
                  type: GitOpsRollout
                  name: Promote to 60 Percent
                  identifier: promoteTo60
                  spec:
                    appName: podinfo-prod
                    agentIdentifier: org.gitopsappteamone
                    namespace: appteam-one-prod
                    rolloutName: podinfo
                    waitUntilHealthStatus:
                      healthStatus: Suspended
                      healthMessage: CanaryPauseStep
                  timeout: 10m
              - parallel:
                  - step:
                      type: Wait
                      name: Soak at 60 Percent
                      identifier: soakAt60
                      spec:
                        duration: 2m
                  - step:
                      type: Verify
                      name: Verify_2
                      identifier: Verify_2
                      spec:
                        isMultiServicesOrEnvs: false
                        type: Canary
                        monitoredService:
                          type: Default
                          spec: {}
                        spec:
                          sensitivity: HIGH
                          duration: 5m
                          shouldUseCDNodes: true
                      timeout: 2h
                      failureStrategies:
                        - onFailure:
                            errors:
                              - Verification
                            action:
                              type: ManualIntervention
                              spec:
                                timeout: 2h
                                onTimeout:
                                  action:
                                    type: StageRollback
                        - onFailure:
                            errors:
                              - Unknown
                            action:
                              type: ManualIntervention
                              spec:
                                timeout: 2h
                                onTimeout:
                                  action:
                                    type: Ignore
              - step:
                  type: GitOpsRollout
                  name: Promote to 100 Percent
                  identifier: promoteTo100
                  spec:
                    appName: podinfo-prod
                    agentIdentifier: org.gitopsappteamone
                    namespace: appteam-one-prod
                    rolloutName: podinfo
                    waitUntilHealthStatus:
                      healthStatus: Suspended
                    autoRolloutAction: promote-full
                  timeout: 10m
            rollbackSteps:
              - step:
                  type: RevertPR
                  name: RevertPR
                  identifier: RevertPR
                  timeout: 10m
                  spec:
                    commitId: <+pipeline.stages.Prod.spec.execution.steps.updateReleaseRepo.updateReleaseRepoOutcome.commitId>
              - step:
                  type: MergePR
                  name: Merge Revert PR
                  identifier: mergeRevertPR
                  timeout: 10m
                  spec:
                    deleteSourceBranch: true
                    mergeStrategy: merge
              - step:
                  type: GitOpsSync
                  name: Sync Rollback
                  identifier: syncRollbackProd
                  timeout: 5m
                  spec:
                    waitTillHealthy: true
                    prune: false
                    dryRun: false
                    applyOnly: false
                    forceApply: false
                    retryStrategy: {}
                    retry: false
                    syncOptions:
                      skipSchemaValidation: false
                      autoCreateNamespace: false
                      pruneResourcesAtLast: false
                      applyOutOfSyncOnly: false
                      replaceResources: false
                      prunePropagationPolicy: foreground
                      respectIgnoreDifferences: false
                      serverSideApply: false
                    autoPromoteRolloutBehavior: promote-full
                    applicationsList:
                      - applicationName: podinfo-prod
                        agentId: org.gitopsappteamone
          service:
            useFromStage:
              stage: Dev
          environment:
            environmentRef: prod
            deployToAll: false
            gitOpsClusters:
              - identifier: org.incluster
                agentIdentifier: org.gitopsappteamone
        tags: {}
        failureStrategies:
          - onFailure:
              errors:
                - AllErrors
              action:
                type: StageRollback
