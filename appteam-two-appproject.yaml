# AppProject for App Team Two, created IN the gitops-app-team-one instance that is
# temporarily hosting app-team-two. The app-team-two ApplicationSet references this
# project (spec.template.spec.project: app-team-two); an AppProject is only visible
# to Applications in the same namespace as the Argo CD instance, so it must live in
# gitops-app-team-one (not argocd-prod, which has its own app-team-two project).
# Mirrors the existing app-team-one project, scoped to team-two's dev+prod namespaces.
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: app-team-two
  namespace: gitops-app-team-one
spec:
  description: App Team Two (podinfo) - dev + prod
  destinations:
    - namespace: appteam-two-dev
      server: https://kubernetes.default.svc
    - namespace: appteam-two-prod
      server: https://kubernetes.default.svc
  namespaceResourceWhitelist:
    - group: '*'
      kind: '*'
  sourceRepos:
    - https://github.com/harness-landing-zone/pod-info-demo
