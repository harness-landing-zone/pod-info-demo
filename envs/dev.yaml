# Dev (appteam-one-dev). CLASSIC Argo deployment — plain Deployment, NO rollouts.
workload:
  kind: Deployment

image:
  tag: "v0.1"          # baseline; pipeline promotes v0.2 on new-artifact trigger

replicaCount: 4

# (rollout/canary settings ignored for a Deployment)
analysis:
  enabled: false

monitoring:
  enabled: false

ingress:
  enabled: false
