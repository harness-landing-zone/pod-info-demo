{{- /*
ONE ApplicationSet per tier (= per ArgoCD instance). Clusters are selected by
their `tier` label; everything per-environment (app name, namespace, values
files, envRef) is resolved at ArgoCD time from the matched cluster secret's
`environment` label. Adding an environment = registering a labeled cluster
secret + an envs/<env>.yaml file — no change here.
`project` stays a STATIC name (per tier) so Harness maps the appset.
ArgoCD templates are escaped from Helm with backtick quoting.
*/ -}}
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: {{ .Values.appName }}-{{ .Values.tier }}
  namespace: {{ .Values.argocdNamespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  generators:
    - clusters:
        selector:
          matchLabels:
            tier: {{ .Values.tier }}
  template:
    metadata:
      name: '{{ .Values.appName }}-{{`{{ .metadata.labels.environment }}`}}'
      labels:
        harness.io/serviceRef: {{ .Values.service }}
        harness.io/envRef: '{{`{{ .metadata.labels.environment }}`}}'
        app: {{ .Values.appName }}
        environment: '{{`{{ .metadata.labels.environment }}`}}'
        tier: '{{`{{ .metadata.labels.tier }}`}}'
    spec:
      # Static per-tier AppProject name so Harness maps the appset to the project.
      project: {{ .Values.team }}-{{ .Values.tier }}
      sources:
        - repoURL: {{ .Values.repoURL }}
          targetRevision: {{ .Values.targetRevision }}
          path: chart
          helm:
            releaseName: '{{ .Values.appName }}-{{`{{ .metadata.labels.environment }}`}}'
            ignoreMissingValueFiles: true
            # Layered values resolved per matched cluster from its secret labels.
            # Later files override earlier. All layers optional except the env
            # one by convention — Harness UpdateReleaseRepo writes image.tag there.
            valueFiles:
              - "$values/envs/defaults.yaml"
              - "$values/envs/tiers/{{`{{ .metadata.labels.tier }}`}}.yaml"
              - "$values/envs/{{`{{ .metadata.labels.environment }}`}}.yaml"
            values: |
              securityContext:
                runAsUser: 100
        - repoURL: {{ .Values.repoURL }}
          targetRevision: {{ .Values.targetRevision }}
          ref: values
      destination:
        # The matched cluster's registered name (secret `name` field).
        name: '{{`{{ .name }}`}}'
        namespace: '{{ .Values.appName }}-{{`{{ .metadata.labels.environment }}`}}'
      ignoreDifferences:
        - group: ""
          kind: Service
          jsonPointers:
            - /spec/selector
      syncPolicy:
        {{- if .Values.autoSync }}
        automated:
          prune: true
          selfHeal: false
          allowEmpty: false
        {{- end }}
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
        retry:
          limit: 5
          backoff:
            duration: 10s
            factor: 2
            maxDuration: 3m
