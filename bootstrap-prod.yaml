# PROD bootstrap (app-of-appsets) — runs on the gitops-prod instance.
# Mirror of bootstrap.yaml but scans applicationset/prod/*.yaml and installs those appsets into
# the gitops-prod platform ns. Generated Applications belong to the platformteam project.
# Applied by the platform admin: oc apply -f bootstrap-prod.yaml
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: platform-bootstrap
  namespace: gitops-prod
spec:
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  generators:
    - git:
        repoURL: https://github.com/harness-landing-zone/pod-info-demo
        revision: main
        files:
          - path: applicationset/prod/*.yaml
  template:
    metadata:
      name: 'appset-{{ .metadata.name }}'
    spec:
      project: platformteam
      source:
        repoURL: https://github.com/harness-landing-zone/pod-info-demo
        targetRevision: main
        path: '{{ .path.path }}'
        directory:
          recurse: false
          include: '{{ .path.filename }}'
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{ .metadata.namespace }}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
