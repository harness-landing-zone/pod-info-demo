# PLATFORM BOOTSTRAP (prod) — runs on the gitops-prod ArgoCD instance.
# Deploys the `appsets` Helm chart into gitops-prod, driven by
# applicationset/prod/values.yaml. Applied by the platform admin: oc apply -f bootstrap-prod.yaml
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: platform-bootstrap
  namespace: gitops-prod
spec:
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  generators:
    - git:
        repoURL: https://github.com/harness-landing-zone/pod-info-demo
        revision: main
        files:
          - path: applicationset/prod/values.yaml
  template:
    metadata:
      name: 'appsets-{{ .argocdNamespace }}'
    spec:
      project: default
      sources:
        - repoURL: https://github.com/harness-landing-zone/pod-info-demo
          targetRevision: main
          path: charts/appsets
          helm:
            valueFiles:
              - '$values/applicationset/prod/values.yaml'
        - repoURL: https://github.com/harness-landing-zone/pod-info-demo
          targetRevision: main
          ref: values
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{ .argocdNamespace }}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - ServerSideApply=true
