# Apply ONLY to k3d-np:
#   kubectl --context k3d-np apply -f applicationset/podinfo-np.yaml -n gitops-agent

apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: podinfo-np
  namespace: gitops-agent
spec:
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  syncPolicy:
    preserveResourcesOnDeletion: false
  generators:
    - list:
        elements:
          - env: np
  template:
    metadata:
      name: 'podinfo-{{ .env }}'
      labels:
        harness.io/serviceRef: "demoapp"
        harness.io/envRef: '{{ .env }}'
        app: podinfo
        environment: '{{ .env }}'
    spec:
      project: b5f0b0f5
      sources:
        - repoURL: https://github.com/harness-landing-zone/pod-info-demo
          targetRevision: main
          path: chart
          helm:
            releaseName: 'podinfo-{{ .env }}'
            ignoreMissingValueFiles: true
            valueFiles:
              - '$values/envs/{{ .env }}.yaml'
        - repoURL: https://github.com/harness-landing-zone/pod-info-demo
          targetRevision: main
          ref: values
      destination:
        server: https://kubernetes.default.svc
        namespace: podinfo
      ignoreDifferences:
        # argo-rollouts injects rollouts-pod-template-hash into Service selectors
        # at runtime — ignore so Argo CD doesn't flag drift.
        - group: ""
          kind: Service
          jsonPointers:
            - /spec/selector
      syncPolicy:
        automated:
          prune: true
          selfHeal: false
          allowEmpty: false
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
        retry:
          limit: 5
          backoff:
            duration: 10s
            factor: 2
            maxDuration: 3m
