# ApplicationSet for the app-team-one Harness project — DEV instance (argocd-dev).
# One ApplicationSet per Harness project; this project = the podinfo application.
# Lives in argocd-dev (the namespace the dev BYOA agent watches). The prod sibling
# lives in argocd-prod with env=prod (see app-team-one-prod.yaml when we get there).
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: app-team-one
  namespace: argocd-dev
spec:
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  generators:
    - list:
        elements:
          - env: dev          # -> envs/dev.yaml (you renamed np.yaml -> dev.yaml)
  template:
    metadata:
      name: 'podinfo-{{ .env }}'
      labels:
        harness.io/serviceRef: podinfo
        harness.io/envRef: '{{ .env }}'
        app: podinfo
        environment: '{{ .env }}'
    spec:
      project: app-team-one
      # Multi-source: Helm chart from path `chart`, env value file pulled via the
      # `$values` ref to the same repo (Argo CD multi-source pattern).
      sources:
        - repoURL: https://github.com/harness-landing-zone/pod-info-demo
          targetRevision: main
          path: chart
          helm:
            releaseName: 'podinfo-{{ .env }}'
            ignoreMissingValueFiles: true
            valueFiles:
              - '$values/envs/{{ .env }}.yaml'
            # TEMPORARY OpenShift fix (remove once the chart is fixed in GitHub):
            # the chart hardcodes container securityContext.runAsUser: 10001, which
            # OpenShift's restricted-v2 SCC rejects (UID must be in the namespace's
            # assigned range). Null it so OpenShift assigns a valid non-root UID.
            # Inline `values` has highest precedence (chart < env file < this).
            values: |
              securityContext:
                runAsUser: null
        - repoURL: https://github.com/harness-landing-zone/pod-info-demo
          targetRevision: main
          ref: values
      destination:
        server: https://kubernetes.default.svc   # in-cluster
        namespace: team-one-dev                   # managed-by=argocd-dev, has the RolloutManager
      ignoreDifferences:
        # argo-rollouts injects rollouts-pod-template-hash into Service selectors at
        # runtime — ignore so Argo CD doesn't flag perpetual drift.
        - group: ""
          kind: Service
          jsonPointers:
            - /spec/selector
      syncPolicy:
        automated:
          prune: true
          selfHeal: false
          allowEmpty: false
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
        retry:
          limit: 5
          backoff:
            duration: 10s
            factor: 2
            maxDuration: 3m
