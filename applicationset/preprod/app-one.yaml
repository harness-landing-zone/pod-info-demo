apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: app-one-np
  namespace: gitops-preprod
spec:
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  generators:
    # The CLUSTER is chosen by labels on its ArgoCD cluster Secret (environment=nonprod),
    # not hardcoded. The inner list fans out the namespaces the non-prod tier runs on it.
    - matrix:
        generators:
          - clusters:
              selector:
                matchLabels:
                  environment: nonprod
          - list:
              elements:
                - env: dev
                  namespace: podinfo-dev
                - env: staging
                  namespace: podinfo-staging
  template:
    metadata:
      name: 'podinfo-{{ .env }}'
      labels:
        # Harness GitOps mapping LABELS (not annotations):
        # serviceRef = Harness Service id (appone, project appteamone); envRef = Harness Environment id.
        harness.io/serviceRef: appone
        harness.io/envRef: '{{ .env }}'
        app: podinfo
        environment: '{{ .env }}'
    spec:
      project: appteamone        # generated Application -> appteamone AppProject (NOT platformteam)
      # Multi-source: Helm chart from path `chart`, env value file via the `$values` ref.
      sources:
        - repoURL: https://github.com/harness-landing-zone/pod-info-demo
          targetRevision: main
          path: chart
          helm:
            releaseName: 'podinfo-{{ .env }}'
            ignoreMissingValueFiles: true
            valueFiles:
              - '$values/envs/{{ .env }}.yaml'
            values: |
              securityContext:
                runAsUser: null     # OpenShift restricted-v2: let the SCC assign the UID
        - repoURL: https://github.com/harness-landing-zone/pod-info-demo
          targetRevision: main
          ref: values
      destination:
        # Cluster supplied by the clusters generator (the secret labeled environment=nonprod).
        # .name is the registered cluster-secret name, so this survives k3d's ephemeral ports.
        name: '{{ .name }}'
        namespace: '{{ .namespace }}'
      ignoreDifferences:
        # argo-rollouts injects rollouts-pod-template-hash into Service selectors at runtime.
        - group: ""
          kind: Service
          jsonPointers:
            - /spec/selector
      syncPolicy:
        automated:                 # dev auto-syncs (fast iteration)
          prune: true
          selfHeal: false
          allowEmpty: false
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
        retry:
          limit: 5
          backoff:
            duration: 10s
            factor: 2
            maxDuration: 3m
