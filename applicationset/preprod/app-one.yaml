apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: app-one-np
  namespace: gitops-preprod
spec:
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  generators:
    - clusters:
        selector:
          matchLabels:
            tier: nonprod
        values:
          env: '{{ .metadata.labels.environment }}'
  template:
    metadata:
      name: 'podinfo-{{ .values.env }}'
      labels:
        harness.io/serviceRef: appone
        harness.io/envRef: '{{ .values.env }}'
        app: podinfo
        environment: '{{ .values.env }}'
    spec:
      # Per-env AppProject, each locked to exactly one cluster+namespace (proves isolation).
      project: 'appteamone-{{ .values.env }}'
      # Multi-source: Helm chart from path `chart`, env value file via the `$values` ref.
      sources:
        - repoURL: https://github.com/harness-landing-zone/pod-info-demo
          targetRevision: main
          path: chart
          helm:
            releaseName: 'podinfo-{{ .values.env }}'
            ignoreMissingValueFiles: true
            valueFiles:
              - '$values/envs/{{ .values.env }}.yaml'
            values: |
              securityContext:
                runAsUser: null     # OpenShift restricted-v2: let the SCC assign the UID
        - repoURL: https://github.com/harness-landing-zone/pod-info-demo
          targetRevision: main
          ref: values
      destination:
        # .name = the matched cluster's registered secret name (dev | staging).
        name: '{{ .name }}'
        namespace: 'podinfo-{{ .values.env }}'
      ignoreDifferences:
        - group: ""
          kind: Service
          jsonPointers:
            - /spec/selector
      syncPolicy:
        automated:
          prune: true
          selfHeal: false
          allowEmpty: false
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
        retry:
          limit: 5
          backoff:
            duration: 10s
            factor: 2
            maxDuration: 3m
