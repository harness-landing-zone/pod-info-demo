# Drives the `appsets` Helm chart for the NON-PROD tier (gitops-preprod ArgoCD instance).
# Add an environment here -> one more ApplicationSet + AppProject, no new YAML files.
argocdNamespace: gitops-preprod
repoURL: https://github.com/harness-landing-zone/pod-info-demo
targetRevision: main
service: appone
# Values files now resolve from cluster-secret labels (environment/tier):
#   envs/defaults.yaml -> envs/tiers/nonprod.yaml -> envs/<environment>.yaml
environments:
  - name: dev
    namespace: podinfo-dev
    project: appteamone-dev
    autoSync: true
  - name: staging
    namespace: podinfo-staging
    project: appteamone-staging
    autoSync: true
