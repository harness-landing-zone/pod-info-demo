# Drives the `appsets` Helm chart for the NON-PROD tier (gitops-preprod ArgoCD instance).
# One ApplicationSet + one AppProject for the whole tier. Adding an environment:
# register the cluster secret with labels environment=<name>,tier=nonprod and
# add envs/<name>.yaml — nothing to change in this file.
argocdNamespace: gitops-preprod
tier: nonprod
autoSync: true
repoURL: https://github.com/harness-landing-zone/pod-info-demo
targetRevision: main
appName: podinfo
service: appone
team: appteamone
