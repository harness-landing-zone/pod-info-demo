# app-one ApplicationSet — App Team One, PROD tier (lives in the platform ns gitops-prod).
# Pure cluster generator: targets the prod spoke (tier=prod); its `environment` label (prod)
# drives the namespace, env value file and AppProject. MANUAL sync — the Harness pipeline gates
# promotion. prod = Argo Rollouts canary (envs/prod.yaml) so the prod spoke needs the
# argo-rollouts CRD + controller installed.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: app-one-prod
  namespace: gitops-prod
spec:
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  generators:
    - clusters:
        selector:
          matchLabels:
            tier: prod
        values:
          env: '{{ .metadata.labels.environment }}'
  template:
    metadata:
      name: 'podinfo-{{ .values.env }}'
      labels:
        harness.io/serviceRef: appone
        harness.io/envRef: '{{ .values.env }}'
        app: podinfo
        environment: '{{ .values.env }}'
    spec:
      project: 'appteamone-{{ .values.env }}'
      sources:
        - repoURL: https://github.com/harness-landing-zone/pod-info-demo
          targetRevision: main
          path: chart
          helm:
            releaseName: 'podinfo-{{ .values.env }}'
            ignoreMissingValueFiles: true
            valueFiles:
              - '$values/envs/{{ .values.env }}.yaml'
            values: |
              securityContext:
                runAsUser: null
        - repoURL: https://github.com/harness-landing-zone/pod-info-demo
          targetRevision: main
          ref: values
      destination:
        # .name = the matched cluster's registered secret name (prod).
        name: '{{ .name }}'
        namespace: 'podinfo-{{ .values.env }}'
      ignoreDifferences:
        - group: ""
          kind: Service
          jsonPointers:
            - /spec/selector
      syncPolicy:
        # NO automated block: prod is manual (Harness pipeline promotes).
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
        retry:
          limit: 5
          backoff:
            duration: 10s
            factor: 2
            maxDuration: 3m
