apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: app-team-two
  namespace: gitops-app-team-one
spec:
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  generators:
    - list:
        elements:
          - env: dev
            namespace: appteam-two-dev
          - env: prod
            namespace: appteam-two-prod
  template:
    metadata:
      name: 'podinfo-{{ .env }}'
      labels:
        # Harness GitOps mapping labels (LABELS, not annotations):
        # serviceRef = Harness service identifier (apptwo); envRef = Harness environment id.
        harness.io/serviceRef: apptwo
        harness.io/envRef: '{{ .env }}'
        app: podinfo
        environment: '{{ .env }}'
    spec:
      project: app-team-two
      # Multi-source: Helm chart from path `chart`, env value file via the `$values` ref.
      sources:
        - repoURL: https://github.com/harness-landing-zone/pod-info-demo
          targetRevision: main
          path: chart
          helm:
            releaseName: 'podinfo-two-{{ .env }}'
            ignoreMissingValueFiles: true
            valueFiles:
              - '$values/envs/{{ .env }}.yaml'
            values: |
              securityContext:
                runAsUser: null
        - repoURL: https://github.com/harness-landing-zone/pod-info-demo
          targetRevision: main
          ref: values
      destination:
        server: https://kubernetes.default.svc   # in-cluster (this team's cluster)
        namespace: '{{ .namespace }}'
      ignoreDifferences:
        # argo-rollouts injects rollouts-pod-template-hash into Service selectors at runtime.
        - group: ""
          kind: Service
          jsonPointers:
            - /spec/selector
  # Per-env sync posture: dev auto-syncs; prod is manual (Harness pipeline triggers the promotion).
  templatePatch: |
    spec:
      syncPolicy:
        {{- if eq .env "dev" }}
        automated:
          prune: true
          selfHeal: false
          allowEmpty: false
        {{- end }}
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
        retry:
          limit: 5
          backoff:
            duration: 10s
            factor: 2
            maxDuration: 3m
