# Workload destination namespaces for App Team Two (podinfo dev + prod).
# Mirrors appteam-one-dev/prod: managed-by points at gitops-app-team-one, the
# instance TEMPORARILY hosting app-team-two (argocd-prod's agent is down), so that
# instance gets the RBAC to deploy podinfo into these namespaces.
#
# NOTE: the app-team-two ApplicationSet already sets CreateNamespace=true, which
# would create these on sync — but applying them declaratively (a) guarantees the
# argocd.argoproj.io/managed-by label/RBAC is present (CreateNamespace alone does
# NOT grant the instance permission to manage resources in a new namespace), and
# (b) keeps the namespaces in Git.
apiVersion: v1
kind: Namespace
metadata:
  name: appteam-two-dev
  labels:
    argocd.argoproj.io/managed-by: gitops-app-team-one
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/audit-version: latest
    pod-security.kubernetes.io/warn: restricted
    pod-security.kubernetes.io/warn-version: latest
---
apiVersion: v1
kind: Namespace
metadata:
  name: appteam-two-prod
  labels:
    argocd.argoproj.io/managed-by: gitops-app-team-one
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/audit-version: latest
    pod-security.kubernetes.io/warn: restricted
    pod-security.kubernetes.io/warn-version: latest
