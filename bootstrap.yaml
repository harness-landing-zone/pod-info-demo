apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: platform-bootstrap
  namespace: gitops-preprod
spec:
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  generators:
    - git:
        repoURL: https://github.com/harness-landing-zone/pod-info-demo
        revision: main
        files:
          - path: applicationset/preprod/*.yaml
  template:
    metadata:
      name: 'appset-{{ .metadata.name }}'
    spec:
      # The appset-deploying Applications belong to the PLATFORM team's project.
      project: default
      source:
        repoURL: https://github.com/harness-landing-zone/pod-info-demo
        targetRevision: main
        # .path.path = the matched file's directory (e.g. applicationset/preprod) — dynamic so the
        # same template works for any subfolder.
        path: '{{ .path.path }}'
        directory:
          recurse: false
          # Deploy only this one file out of the folder.
          include: '{{ .path.filename }}'
      destination:
        server: https://kubernetes.default.svc
        # "Relevant namespace" = the namespace each appset declares in its metadata.
        namespace: '{{ .metadata.namespace }}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
