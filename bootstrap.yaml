# PLATFORM BOOTSTRAP (non-prod) — runs on the gitops-preprod ArgoCD instance.
# Deploys the `appsets` Helm chart into gitops-preprod, driven by
# applicationset/preprod/values.yaml. The chart renders one ApplicationSet + one
# AppProject per environment, each with a STATIC project so Harness maps them.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: platform-bootstrap
  namespace: gitops-preprod
spec:
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  generators:
    # Reads the tier values file so argocdNamespace drives the destination.
    - git:
        repoURL: https://github.com/harness-landing-zone/pod-info-demo
        revision: main
        files:
          - path: applicationset/preprod/values.yaml
  template:
    metadata:
      name: 'appsets-{{ .argocdNamespace }}'
    spec:
      project: default
      # Multi-source: the chart + the repo (as $values) for the external values file.
      sources:
        - repoURL: https://github.com/harness-landing-zone/pod-info-demo
          targetRevision: main
          path: charts/appsets
          helm:
            valueFiles:
              - '$values/applicationset/preprod/values.yaml'
        - repoURL: https://github.com/harness-landing-zone/pod-info-demo
          targetRevision: main
          ref: values
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{ .argocdNamespace }}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - ServerSideApply=true
